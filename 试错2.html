<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="keywords" content="葫芦侠,侠聚网络,葫芦侠三楼,葫芦侠虚拟机">

    <title>葫芦侠 - 广州侠聚网络科技有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --hulu-green: #4CAF50;
            --hulu-green-light: #E8F5E9;
            --hulu-yellow: #FFC107;
            --hulu-gray: #F5F7FA;
            --hulu-text-primary: #1D2329;
            --hulu-text-secondary: #4E5969;
            --hulu-text-tertiary: #86909C;
            --hulu-border: #E5E6EB;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        html, body {
            width: 100%;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: auto;
        }
        
        body {
            background-color: var(--hulu-gray);
            color: var(--hulu-text-primary);
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 20px;
            will-change: auto;
        }
        
        .header {
            background-color: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: var(--shadow-sm);
            transition: none;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-img {
            width: 28px;
            height: 28px;
            background: url('https://picsum.photos/id/237/28/28') center/contain no-repeat;
            border-radius: 4px;
            background-color: var(--hulu-green);
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--hulu-green);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .search-btn, .menu-btn {
            width: 24px;
            height: 24px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 50%;
            cursor: pointer;
        }
        .search-btn {
            background-image: url('https://picsum.photos/id/1025/24/24');
        }
        .menu-btn {
            background-image: url('https://picsum.photos/id/1027/24/24');
        }
        .search-btn:active, .menu-btn:active {
            transform: scale(0.9);
        }
        
        .banner-container {
            position: relative;
            height: 200px;
            overflow: hidden;
            border-radius: var(--radius-lg);
            margin: 12px 16px;
            touch-action: pan-y;
        }
        
        .banner-slider {
            display: flex;
            width: 400%;
            height: 100%;
            transition: transform 0.4s linear;
        }
        
        .banner-slide {
            width: 25%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .banner-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
        }
        
        .dot.active {
            background-color: var(--hulu-yellow);
            width: 18px;
            border-radius: 3px;
        }
        
        .nav-section {
            background-color: white;
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            margin: 0 16px 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 6px;
            cursor: pointer;
        }
        .nav-item:active {
            transform: scale(0.95);
        }
        
        .nav-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--hulu-green-light);
        }
        .nav-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        
        .nav-text {
            font-size: 12px;
            color: var(--hulu-text-secondary);
            font-weight: 500;
        }
        
        .geek-section {
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            margin: 0 16px 16px;
        }
        
        .geek-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .geek-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--hulu-green);
        }
        
        .geek-desc {
            font-size: 14px;
            color: var(--hulu-text-secondary);
            margin-bottom: 12px;
        }
        
        .geek-btn {
            background-color: var(--hulu-green);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .geek-btn:active {
            transform: scale(0.96);
        }
        
        .geek-image {
            width: 80px;
            height: 80px;
            background: url('https://picsum.photos/id/20/100/100') center/contain no-repeat;
            border-radius: 50%;
        }
        
        .news-section {
            background-color: white;
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            margin: 0 16px 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .news-item {
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
        }
        .news-item:active {
            background: #f0f0f0;
        }
        
        .news-img {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            object-fit: cover;
        }
        
        .news-info {
            flex: 1;
        }
        
        .news-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-time {
            font-size: 11px;
            color: var(--hulu-text-tertiary);
        }
        
        .service-section {
            background-color: white;
            border-radius: var(--radius-lg);

            margin: 0 16px 16px;
            box-shadow: var(--shadow-sm);

        /* 高级简约弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .bottom-modal {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.08);
            z-index: 1001;
            transition: transform 0.3s ease;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f1f1;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #222;
        }
        .modal-close {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 16px;
            color: #555;
            cursor: pointer;
        }
        .modal-content {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 横向轮播 - 无文字、全屏、无滚动 */
        .product-swiper {
            width: 240px;
            height: 380px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }
        .swiper-wrap {
            display: flex;
            height: 100%;
            transition: transform 0.4s ease;
        }
        .swiper-slide {
            min-width: 100%;
            height: 100%;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }
        .swiper-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }
        .swiper-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
        }
        .swiper-dot.active {
            background: #fff;
            width: 16px;
            border-radius: 3px;
        }

        /* 轮播左右按钮 */
        .swiper-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
        }
        .swiper-btn.prev { left: 8px; }
        .swiper-btn.next { right: 8px; }

        .modal-overlay.show { display: block; opacity: 1; }
        .bottom-modal.show { transform: translate(-50%, 0); }
        
        .footer {
            background-color: white;
            padding: 24px 16px;
            text-align: center;
            border-top: 1px solid var(--hulu-border);
            border-radius: 16px 16px 0 0;
        }

        .links { display: flex; justify-content: center; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
        .link { font-size: 11px; color: var(--hulu-text-tertiary); text-decoration: none; }
        .lang-select { font-size: 11px; color: var(--hulu-text-tertiary); background: none; border: 1px solid #eee; border-radius: 4px; padding: 2px 4px; cursor: pointer; }
    </style>
</head>

    // 弹窗元素（完全没动）

       // 仅丰富+排版弹窗内容，其余代码完全不动

        }
    };

    const productData = {
        huluxia: { title:"葫芦侠", imgs:[
            "https://picsum.photos/id/237/240/380",
            "https://picsum.photos/id/238/240/380",
            "https://picsum.photos/id/239/240/380"
        ]},
        f3: { title:"葫芦侠三楼", imgs:[
            "https://picsum.photos/id/1025/240/380",
            "https://picsum.photos/id/1026/240/380",

        ]},
        virtual: { title:"葫芦侠虚拟机", imgs:[
            "https://picsum.photos/id/1027/240/380",
            "https://picsum.photos/id/1029/240/380",
            "https://picsum.photos/id/1030/240/380"
        ]}
    };

    // ====================== 无缝平滑轮播：3→1平滑滑，不显示2 ======================
    let swiperTimer = null;
    let current = 0;
    let total = 0;
    let swiperWrap = null;
    let swiperDots = null;

    // 更新轮播位置
    function updateSwiper(){
        swiperWrap.style.transform = `translateX(-${current * 100}%)`;
        swiperDots.forEach((dot,i) => dot.classList.toggle('active', i === current % total));
    }

    // 下一张：1→2→3→平滑滑到1，不显示2
    function nextImg(){
        current++;
        updateSwiper();
        
        // 滑到克隆的第一张后，瞬间复位，视觉无缝
        if(current === total){
            setTimeout(() => {
                swiperWrap.style.transition = 'none';
                current = 0;
                updateSwiper();
                setTimeout(() => {
                    swiperWrap.style.transition = 'transform 0.4s ease';
                }, 50);
            }, 400);
        }
    }

    // 上一张：1→3平滑滑，不显示2
    function prevImg(){
        if(current === 0){
            swiperWrap.style.transition = 'none';
            current = total;
            updateSwiper();
            setTimeout(() => {
                swiperWrap.style.transition = 'transform 0.4s ease';
                current--;
                updateSwiper();
            }, 50);
        }else{
            current--;
            updateSwiper();
        }
    }

    // 自动轮播
    function startAuto(){
        clearInterval(swiperTimer);
        swiperTimer = setInterval(nextImg, 3000);
    }

    // 打开产品弹窗（克隆第一张实现无缝）
    function openProduct(pro) {
        const d = productData[pro];
        modalTitle.textContent = d.title;
        total = d.imgs.length;
        current = 0;
        
        // 核心：末尾克隆第一张，实现3→1平滑滑
        let html = `<div class="product-swiper">
            <div class="swiper-btn prev">‹</div>
            <div class="swiper-btn next">›</div>
            <div class="swiper-wrap">`;
        d.imgs.forEach(img => html += `<div class="swiper-slide"><img src="${img}"></div>`);
        html += `<div class="swiper-slide"><img src="${d.imgs[0]}"></div></div><div class="swiper-dots">`;
        d.imgs.forEach((_,j)=> html += `<div class="swiper-dot ${j===0?'active':''}"></div>`);
        html += `</div></div>`;
        
        modalContent.innerHTML = html;
        overlay.classList.add('show');
        modal.classList.add('show');

        swiperWrap = document.querySelector('.swiper-wrap');
        swiperDots = document.querySelectorAll('.swiper-dot');
        document.querySelector('.swiper-btn.next').onclick = nextImg;
        document.querySelector('.swiper-btn.prev').onclick = prevImg;
        startAuto();
    }
    // ============================================================================

    // 服务弹窗（完全没动）
    function openService(type) {
        const d = modalData[type];
        modalTitle.textContent = d.title;
        modalContent.innerHTML = d.content.replace(/\n/g,'<br>');
        overlay.classList.add('show');
        modal.classList.add('show');
    }

    // 关闭弹窗（完全没动）
    function closeModal() {
        clearInterval(swiperTimer);
        overlay.classList.remove('show');
        modal.classList.remove('show');
    }

    // 绑定点击（完全没动）
    document.querySelectorAll('[data-pro]').forEach(el=>el.onclick=()=>openProduct(el.dataset.pro));
    document.querySelectorAll('[data-type]').forEach(el=>el.onclick=()=>openService(el.dataset.type));
    
    closeBtn.onclick = closeModal;
    overlay.onclick = closeModal;
</script>
</body>
</html>
